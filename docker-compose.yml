services:
  postgres:
    image: postgres:16-alpine
    container_name: miproyecto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: miproyecto
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d miproyecto']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  backend:
    build:
      context: ./backend
    container_name: miproyecto-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      CORS_ORIGIN: '*'
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/miproyecto
    ports:
      - '4000:4000'
    volumes:
      - ./backend/uploads:/usr/src/app/uploads
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
      args:
        EXPO_PUBLIC_API_URL: http://localhost:4000/api
    container_name: miproyecto-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:80'
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  postgres_data: